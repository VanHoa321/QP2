<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE 509</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="result-container" class="card shadow text-center d-none">
                    <div class="card-body py-5">
                        <h2 class="card-title text-success">Hoàn thành bài thi!</h2>
                        <h4 class="mt-3">Điểm của bạn: <span id="score" class="fw-bold fs-2 text-primary">0</span> / <span id="total-questions">0</span></h4>
                        <button class="btn btn-outline-primary mt-4" onclick="location.reload()">Làm lại từ đầu</button>
                    </div>
                </div>

                <div id="quiz-container" class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Trắc nghiệm QP2</h5>
                        <span id="question-progress" class="badge bg-light text-primary fs-6">Câu 1/10</span>
                    </div>
                    <div class="card-body p-4">
                        <h4 id="question-text" class="card-title mb-4">Nội dung câu hỏi sẽ hiển thị ở đây...</h4>
                        
                        <div id="options-container" class="d-grid gap-3">
                            </div>

                        <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
                            
                            <div class="d-flex align-items-center">
                                <label for="jump-input" class="me-2 fw-bold text-muted">Câu:</label>
                                <input type="number" id="jump-input" class="form-control me-2" placeholder="VD: 5" min="1" style="width: 90px;">
                                <button id="jump-btn" class="btn btn-outline-success">Đến</button>
                            </div>

                            <div>
                                <button id="prev-btn" class="btn btn-secondary d-none">Trước</button>
                                <button id="next-btn" class="btn btn-primary d-none">Tiếp theo</button>
                            </div>
                        </div>
                        <p class="mt-4 mb-0 text-center text-muted copyright">&copy; 2026 Võ Văn Hòa. All Rights Reserved.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
